<div id="idevice-1781794431476-m51t4fhy3" class="idevice_node text" data-idevice-path="../idevices/text/" data-idevice-type="text" data-idevice-component-type="json" data-idevice-json-data="{&quot;ideviceId&quot;:&quot;idevice-1781794431476-m51t4fhy3&quot;}">
<div class="exe-text-template">
    <p style="text-align: center;"><span style="font-size: 18pt; color: #3598db;"><strong>Relación de tareas con los elementos curriculares y las recomendaciones de su aplicación en el aula.</strong></span><span style="font-size: 12pt;"></span></p>
<table border="1" style="width: 100.023%;">
<tbody>
<tr>
<td style="width: 18.0191%; text-align: center;"><span style="color: #3598db;"><strong>TAREAS</strong></span></td>
<td style="width: 25.1104%; text-align: center;"><span style="color: #3598db;"><strong>COMPETENCIA ESPECÍFICA</strong></span></td>
<td style="width: 29.7588%; text-align: center;"><span style="color: #3598db;"><strong>CRITERIO DE EVALUACIÓN</strong></span></td>
<td style="width: 27.0885%; text-align: center;"><span style="color: #3598db;"><strong>RECOMENDACIONES</strong></span></td>
</tr>
<tr>
<td style="width: 18.0191%;"><span style="font-size: 10pt;"> Presentación del proyecto y normas de uso seguro de Internet.</span></td>
<td style="width: 25.1104%;"><span style="font-size: 10pt;">CE6. Utilizar de forma responsable y segura las tecnologías digitales.</span></td>
<td style="width: 29.7588%;"><span style="font-size: 10pt;">L.CL.3.B.3.6, Adoptar </span><span style="font-size: 10pt;">hábitos de uso </span><br /><span style="font-size: 10pt;">crítico, seguro,  </span><span style="font-size: 10pt;">sostenible y </span><span style="font-size: 10pt;">saludable de las </span><span style="font-size: 10pt;">tecnologías digitales </span><br /><span style="font-size: 10pt;">en relación con la </span><span style="font-size: 10pt;">búsqueda y la </span><br /><span style="font-size: 10pt;">comunicación de la </span><span style="font-size: 10pt;">información. </span></td>
<td style="width: 27.0885%;"><span style="font-size: 10pt;">Elaborar conjuntamente un decálogo de uso responsable. Recordar normas en cada sesión digital.</span></td>
</tr>
<tr>
<td style="width: 18.0191%;"><span style="font-size: 10pt;">Lectura y análisis de noticias adaptadas a Primaria</span></td>
<td style="width: 25.1104%;"><span style="font-size: 10pt;">CE2. Comprender e interpretar textos orales, escritos y multimodales.</span></td>
<td style="width: 29.7588%;"><span style="font-size: 10pt;">LCL.3.2.1.Comprende</span><span style="font-size: 10pt;">r el sentido de textos </span><span style="font-size: 10pt;">orales y multimo</span><span style="font-size: 10pt;">dales sencillos, reco</span><span style="font-size: 10pt;">nociendo las ideas </span><span style="font-size: 10pt;">principales, los men</span><span style="font-size: 10pt;">sajes explícitos y los </span><span style="font-size: 10pt;">mensajes implícitos más sencillos, ini</span><span style="font-size: 10pt;">ciando, de manera </span><span style="font-size: 10pt;">acompañada, la va</span><span style="font-size: 10pt;">loración crítica del </span><span style="font-size: 10pt;">contenido y de los </span><span style="font-size: 10pt;">elementos no </span><span style="font-size: 10pt;">verbales </span><span style="font-size: 10pt;">elementales.  </span></td>
<td style="width: 27.0885%;"><span style="font-size: 10pt;">Seleccionar noticias cercanas a la realidad del alumnado. Utilizar preguntas guiadas para favorecer el pensamiento crítico.</span></td>
</tr>
<tr>
<td style="width: 18.0191%;"><span style="font-size: 10pt;">Identificación de las partes de una noticia.</span></td>
<td style="width: 25.1104%;"><span style="font-size: 10pt;">CE4. Analizar textos escritos y multimodales.</span></td>
<td style="width: 29.7588%;"><span style="font-size: 10pt;">LCL.3.4.2.Analizar, de </span><span style="font-size: 10pt;">manera </span><span style="font-size: 10pt;">acompañada, el </span><span style="font-size: 10pt;">contenido y </span><span style="font-size: 10pt;">aspectos formales y </span><span style="font-size: 10pt;">no verbales </span><span style="font-size: 10pt;">elementales de </span><br /><span style="font-size: 10pt;">textos escritos y </span><span style="font-size: 10pt;">multimodales, </span><br /><span style="font-size: 10pt;">valorando su </span><span style="font-size: 10pt;">contenido y </span><span style="font-size: 10pt;">estructura e </span><br /><span style="font-size: 10pt;">iniciándose en la </span><span style="font-size: 10pt;">evaluación de su </span><br /><span style="font-size: 10pt;">fiabilidad, para </span><span style="font-size: 10pt;">responder </span><span style="font-size: 10pt;">necesidades </span><span style="font-size: 10pt;">comunicativas </span><span style="font-size: 10pt;">concretas.  </span></td>
<td style="width: 27.0885%;"><span style="font-size: 10pt;">Mostrar ejemplos reales y comparar distintas noticias. Utilizar organizadores gráficos.</span></td>
</tr>
<tr>
<td style="width: 18.0191%;"><span style="font-size: 10pt;">Lluvia de ideas y búsqueda guiada de información e imágenes.</span></td>
<td style="width: 25.1104%;"><span style="font-size: 10pt;">CE6. Buscar, seleccionar y contrastar información procedente de distintas fuentes.</span></td>
<td style="width: 29.7588%;"><span style="font-size: 10pt;">LCL.3.6.1. Localizar y seleccionar </span><br /><span style="font-size: 10pt;">información de</span><span style="font-size: 10pt;"> fuentes, </span><span style="font-size: 10pt;">incluidas las </span><span style="font-size: 10pt;">digitales, para un </span><span style="font-size: 10pt;">proceso de </span><span style="font-size: 10pt;">investigación, e </span><span style="font-size: 10pt;">iniciarse en procesos </span><br /><span style="font-size: 10pt;">para contrastar </span><span style="font-size: 10pt;">resultados, </span><span style="font-size: 10pt;">citándolas y </span><br /><span style="font-size: 10pt;">recreándolas </span><span style="font-size: 10pt;">mediante la </span><span style="font-size: 10pt;">adaptación de </span><span style="font-size: 10pt;">modelos dados.  </span></td>
<td style="width: 27.0885%;"><span style="font-size: 10pt;">Enseñar a verificar fuentes y utilizar bancos de imágenes libres. Supervisar la navegación.</span></td>
</tr>
<tr>
<td style="width: 18.0191%;"><span style="font-size: 10pt;">Planificación y redacción de la noticia</span></td>
<td style="width: 25.1104%;"><span style="font-size: 10pt;">CE5. Producir textos escritos y multimodales adecuados a una finalidad comunicativa.</span></td>
<td style="width: 29.7588%;"><span style="font-size: 10pt;">LCL.3.5.1.Producir textos escritos y multimodales </span><span style="font-size: 10pt;">sencillos y coherentes, en </span><span style="font-size: 10pt;">distintos soportes, para diferentes </span><br /><span style="font-size: 10pt;">modelos discursivos, </span><span style="font-size: 10pt;">iniciándose en</span><span style="font-size: 10pt;"> las normas </span><span style="font-size: 10pt;">gramaticales y </span><span style="font-size: 10pt;">ortográficas</span><span style="font-size: 10pt;">, </span><span style="font-size: 10pt;">progresando, de manera </span><span style="font-size: 10pt;">acompañada, en la </span><span style="font-size: 10pt;">movilización de </span><span style="font-size: 10pt;">estrategias, </span><span style="font-size: 10pt;">individuales o </span><span style="font-size: 10pt;">grupales, </span><span style="font-size: 10pt;">planificación, </span><span style="font-size: 10pt;">redacción, revisión y </span><span style="font-size: 10pt;">edición. </span></td>
<td style="width: 27.0885%;"><span style="font-size: 10pt;">Facilitar plantillas y organizadores. Atender a la diversidad mediante apoyos visuales y ejemplos.</span></td>
</tr>
<tr>
<td style="width: 18.0191%;"><span style="font-size: 10pt;">Diseño de la noticia en Canva.</span></td>
<td style="width: 25.1104%;"><span style="font-size: 10pt;">CE6. Crear contenidos digitales sencillos.</span></td>
<td style="width: 29.7588%;"><span style="font-size: 10pt;">LCL.3.5.1.Producir </span><span style="font-size: 10pt;">textos escritos y </span><br /><span style="font-size: 10pt;">multimodales </span><span style="font-size: 10pt;">sencillos y </span><span style="font-size: 10pt;">coherentes, en </span><span style="font-size: 10pt;">distintos soportes, </span><span style="font-size: 10pt;">para diferentes </span><span style="font-size: 10pt;">modelos discursivos, </span><span style="font-size: 10pt;">iniciándose en </span><span style="font-size: 10pt;">las normas </span><span style="font-size: 10pt;">gramaticales y </span><span style="font-size: 10pt;">ortográficas, </span><span style="font-size: 10pt;">progresando, de </span><span style="font-size: 10pt;">manera </span><span style="font-size: 10pt;">acompañada, en </span><span style="font-size: 10pt;">estrategias sencillas, </span><span style="font-size: 10pt;">individuales o </span><br /><span style="font-size: 10pt;">grupales, de planificación, </span><span style="font-size: 10pt;">redacción, revisión y </span><span style="font-size: 10pt;">edición.  </span><br /><span style="font-size: 10pt;">CMN.3.1.1.Utilizar </span><span style="font-size: 10pt;">dispositivos y </span><span style="font-size: 10pt;">recursos digitales, de </span><span style="font-size: 10pt;">acuerdo con las </span><br /><span style="font-size: 10pt;">necesidades del </span><span style="font-size: 10pt;">contexto educativo </span><br /><span style="font-size: 10pt;">de forma segura, </span><span style="font-size: 10pt;">iniciándose en la </span><br /><span style="font-size: 10pt;">búsqueda de </span><span style="font-size: 10pt;">información, a través </span><span style="font-size: 10pt;">del uso de </span><span style="font-size: 10pt;">estrategias </span><span style="font-size: 10pt;">de comunicación, </span><br /><span style="font-size: 10pt;">trabajando de forma </span><span style="font-size: 10pt;">individual y en </span><br /><span style="font-size: 10pt;">equipo y creando </span><span style="font-size: 10pt;">contenidos digitales.</span></td>
<td style="width: 27.0885%;"><span style="font-size: 10pt;">Proporcionar una plantilla común para evitar dificultades técnicas. Enseñar funciones básicas antes de comenzar.</span></td>
</tr>
<tr>
<td style="width: 18.0191%;"><span style="font-size: 10pt;">Revisión entre iguales mediante rúbrica.</span></td>
<td style="width: 25.1104%;"><span style="font-size: 10pt;">CE8. Reflexionar sobre los propios procesos de aprendizaje y mejorar las producciones.</span></td>
<td style="width: 29.7588%;"><span style="font-size: 10pt;">LCL.2.5.a, Revisar y </span><span style="font-size: 10pt;">mejorar textos </span><br /><span style="font-size: 10pt;">propios y ajenos, </span><span style="font-size: 10pt;">acompañados, c</span><span style="font-size: 10pt;">on </span><span style="font-size: 10pt;">instrumentos de observación.</span></td>
<td style="width: 27.0885%;"><span style="font-size: 10pt;">Modelar previamente cómo realizar críticas constructivas. Utilizar rúbricas sencillas y visuales.</span></td>
</tr>
<tr>
<td style="width: 18.0191%;"><span style="font-size: 10pt;">Creación del periódico digital en Google Sites.</span></td>
<td style="width: 25.1104%;"><span style="font-size: 10pt;">CE6. Crear contenidos digitales colaborativos.</span></td>
<td style="width: 29.7588%;"><span style="font-size: 10pt;">CMN.3.1.1.Utilizar </span><span style="font-size: 10pt;">dispositivos y </span><span style="font-size: 10pt;">recursos digitales, de </span><span style="font-size: 10pt;">acuerdo con las </span><br /><span style="font-size: 10pt;">necesidades del </span><span style="font-size: 10pt;">contexto educativo </span><br /><span style="font-size: 10pt;">de forma segura, </span><span style="font-size: 10pt;">iniciándose en la </span><br /><span style="font-size: 10pt;">búsqueda de </span><span style="font-size: 10pt;">información, a través </span><span style="font-size: 10pt;">de </span><span style="font-size: 10pt;">estrategias básicas </span><span style="font-size: 10pt;">de comunicación, </span><span style="font-size: 10pt;">trabajando </span><span style="font-size: 10pt;">individual y en </span><span style="font-size: 10pt;">equipo y creando </span><span style="font-size: 10pt;">con ayuda </span><span style="font-size: 10pt;">contenidos digitales.</span><br /></td>
<td style="width: 27.0885%;"><span style="font-size: 10pt;">Asignar roles (editor, revisor, diseñador, coordinador). Realizar copias de seguridad periódicas.</span></td>
</tr>
<tr>
<td style="width: 18.0191%;"><span style="font-size: 10pt;">Presentación oral del periódico digital.</span></td>
<td style="width: 25.1104%;"><span style="font-size: 10pt;">CE3. Expresarse oralmente de forma adecuada en diferentes contextos.</span></td>
<td style="width: 29.7588%;"><span style="font-size: 10pt;">CMN.3.3.2.Presentar </span><span style="font-size: 10pt;">el producto final de </span><span style="font-size: 10pt;">los proyectos de </span><span style="font-size: 10pt;">diseño en diferentes </span><span style="font-size: 10pt;">formatos y </span><span style="font-size: 10pt;">explicando los pasos </span><span style="font-size: 10pt;">seguidos con la ayuda del guión.</span></td>
<td style="width: 27.0885%;"><span style="font-size: 10pt;">Ensayar previamente la exposición. Facilitar guiones y apoyos visuales para alumnado con dificultades.</span></td>
</tr>
<tr>
<td style="width: 18.0191%;"><span style="font-size: 10pt;">Autoevaluación y escalera de metacognición.</span></td>
<td style="width: 25.1104%;"><span style="font-size: 10pt;">CE8. Autorregular el aprendizaje y valorar el trabajo realizado.</span></td>
<td style="width: 29.7588%;"><span style="font-size: 10pt;">LCL.2.10.a, Participar en procesos de <br />autoevaluación y coevaluación identificando fortalezas y aspectos <br />a mejorar en el aprendizaje.”</span></td>
<td style="width: 27.0885%;"><span style="font-size: 10pt;">Utilizar preguntas sencillas y ejemplos de respuestas. Relacionar los resultados con futuras mejoras.</span></td>
</tr>
</tbody>
</table>
</div>
</div>
</div>
